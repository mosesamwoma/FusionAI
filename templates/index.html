<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusionAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <header>
        <div class="logo">
            <div class="logo-icon"><span>F</span></div>
            <div class="logo-text">
                <h1>FusionAI</h1>
                <span class="tagline">13 models · 8 providers</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>Live</span>
            </div>
            <button id="reset-btn" onclick="resetChat()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
                New Chat
            </button>
        </div>
    </header>

    <main>
        <div id="chat-box">
            <div class="welcome">
                <div class="welcome-icon">⚡</div>
                <h2>What can I help you with?</h2>
                <p>Powered by 13 AI models working in parallel to give you the best answer.</p>
                <div class="provider-chips">
                    <span>Groq</span><span>Gemini</span><span>Mistral</span>
                    <span>Cerebras</span><span>Cohere</span><span>Nvidia</span>
                    <span>SambaNova</span><span>OpenRouter</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div id="input-wrapper">
            <div id="image-preview" style="display:none;">
                <img id="preview-img" src="" alt="preview" />
                <span id="preview-name"></span>
                <button onclick="clearImage()">✕</button>
            </div>
            <div id="input-area">
                <button id="upload-btn" onclick="document.getElementById('file-input').click()"
                    title="Upload image or PDF">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                </button>
                <input type="file" id="file-input" accept="image/*,.pdf" style="display:none;"
                    onchange="handleFileUpload(event)" />
                <input type="text" id="user-input" placeholder="Ask anything or upload an image / PDF..." autofocus />
                <button id="send-btn" onclick="sendMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
            <p class="disclaimer">FusionAI synthesizes responses from multiple models. Results may vary.</p>
        </div>
    </footer>

    <script>
        marked.setOptions({ breaks: true, gfm: true });

        let currentImageData = null;
        let currentImageMime = null;
        let currentIsPdf = false;

        window.onload = async function () {
            try {
                const res = await fetch("/history");
                const data = await res.json();
                if (data.length > 0) {
                    const welcome = document.querySelector(".welcome");
                    if (welcome) welcome.remove();
                    data.forEach(msg => appendMessage(msg.role, msg.content));
                }
            } catch (e) { }
        };

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            currentImageMime = file.type;
            currentIsPdf = file.type === "application/pdf";

            const preview = document.getElementById("image-preview");
            const img = document.getElementById("preview-img");
            const name = document.getElementById("preview-name");

            if (currentIsPdf) {
                // PDF — show filename, no image preview needed
                img.style.display = "none";
                name.textContent = `📄 ${file.name}`;
                name.style.display = "inline";
                preview.style.display = "flex";

                // Read as base64
                const reader = new FileReader();
                reader.onload = function (e) {
                    currentImageData = e.target.result.split(",")[1];
                };
                reader.readAsDataURL(file);
            } else {
                // Image — show preview
                img.style.display = "block";
                name.style.display = "none";
                preview.style.display = "flex";

                const reader = new FileReader();
                reader.onload = function (e) {
                    img.src = e.target.result;
                    currentImageData = e.target.result.split(",")[1];
                };
                reader.readAsDataURL(file);
            }
        }

        function clearImage() {
            currentImageData = null;
            currentImageMime = null;
            currentIsPdf = false;
            document.getElementById("image-preview").style.display = "none";
            document.getElementById("preview-img").src = "";
            document.getElementById("preview-name").textContent = "";
            document.getElementById("file-input").value = "";
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const message = input.value.trim();
            if (!message && !currentImageData) return;

            const welcome = document.querySelector(".welcome");
            if (welcome) welcome.remove();

            input.value = "";
            document.getElementById("send-btn").disabled = true;

            // Show user message
            const previewSrc = currentImageData && !currentIsPdf
                ? document.getElementById("preview-img").src
                : null;
            const pdfName = currentIsPdf
                ? document.getElementById("preview-name").textContent
                : null;

            appendMessage("user", message, previewSrc, pdfName);
            const thinking = appendThinking();

            const payload = {
                message: message || (currentIsPdf ? "Analyse this document" : "What is in this image?"),
                image_data: currentImageData,
                image_mime: currentImageMime,
            };

            clearImage();

            try {
                const res = await fetch("/chat/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                thinking.remove();

                // Create streaming bubble
                const box = document.getElementById("chat-box");
                const wrapper = document.createElement("div");
                wrapper.className = "message-wrapper assistant";

                const avatar = document.createElement("div");
                avatar.className = "avatar";
                avatar.textContent = "F";
                wrapper.appendChild(avatar);

                const bubble = document.createElement("div");
                bubble.className = "bubble assistant";

                const textDiv = document.createElement("div");
                bubble.appendChild(textDiv);
                wrapper.appendChild(bubble);
                box.appendChild(wrapper);

                // Read stream
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    const lines = text.split("\n");

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const chunk = line.slice(6);
                            if (chunk === "[DONE]") break;
                            fullText += chunk;
                            textDiv.innerHTML = marked.parse(fullText);
                            box.scrollTop = box.scrollHeight;
                        }
                    }
                }

            } catch (err) {
                thinking.remove();
                appendMessage("assistant", "Something went wrong. Please try again.");
            }

            document.getElementById("send-btn").disabled = false;
            input.focus();
        }

        function appendMessage(role, text, imageSrc = null, pdfName = null) {
            const box = document.getElementById("chat-box");
            const wrapper = document.createElement("div");
            wrapper.className = `message-wrapper ${role}`;

            if (role === "assistant") {
                const avatar = document.createElement("div");
                avatar.className = "avatar";
                avatar.textContent = "F";
                wrapper.appendChild(avatar);
            }

            const bubble = document.createElement("div");
            bubble.className = `bubble ${role}`;

            // Show image preview in chat
            if (imageSrc) {
                const img = document.createElement("img");
                img.src = imageSrc;
                img.className = "chat-image";
                bubble.appendChild(img);
            }

            // Show PDF name in chat
            if (pdfName) {
                const pdfDiv = document.createElement("div");
                pdfDiv.className = "chat-pdf";
                pdfDiv.textContent = pdfName;
                bubble.appendChild(pdfDiv);
            }

            if (text) {
                const textDiv = document.createElement("div");
                if (role === "assistant") {
                    textDiv.innerHTML = marked.parse(text);
                } else {
                    textDiv.textContent = text;
                }
                bubble.appendChild(textDiv);
            }

            wrapper.appendChild(bubble);
            box.appendChild(wrapper);
            box.scrollTop = box.scrollHeight;
            return wrapper;
        }

        function appendThinking() {
            const box = document.getElementById("chat-box");
            const wrapper = document.createElement("div");
            wrapper.className = "message-wrapper assistant";

            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.textContent = "F";
            wrapper.appendChild(avatar);

            const bubble = document.createElement("div");
            bubble.className = "bubble assistant thinking";
            bubble.innerHTML = `
                <div class="thinking-dots">
                    <span></span><span></span><span></span>
                </div>
                <span class="thinking-text">Querying 13 models...</span>
            `;
            wrapper.appendChild(bubble);
            box.appendChild(wrapper);
            box.scrollTop = box.scrollHeight;
            return wrapper;
        }

        async function resetChat() {
            await fetch("/reset", { method: "POST" });
            clearImage();
            const box = document.getElementById("chat-box");
            box.innerHTML = `
                <div class="welcome">
                    <div class="welcome-icon">⚡</div>
                    <h2>What can I help you with?</h2>
                    <p>Powered by 13 AI models working in parallel to give you the best answer.</p>
                    <div class="provider-chips">
                        <span>Groq</span><span>Gemini</span><span>Mistral</span>
                        <span>Cerebras</span><span>Cohere</span><span>Nvidia</span>
                        <span>SambaNova</span><span>OpenRouter</span>
                    </div>
                </div>`;
        }

        document.getElementById("user-input").addEventListener("keydown", function (e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>

</html>
