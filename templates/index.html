<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusionAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a1a2e;
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.4rem;
            color: #7c83fd;
            font-weight: 700;
            letter-spacing: 1px;
        }

        header span {
            font-size: 0.75rem;
            color: #888;
        }

        #reset-btn {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        #reset-btn:hover {
            border-color: #7c83fd;
            color: #7c83fd;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .user {
            background: #7c83fd;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .assistant {
            background: #1e1e2e;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #2a2a4a;
        }

        .thinking {
            background: #1e1e2e;
            color: #666;
            align-self: flex-start;
            border: 1px dashed #333;
            font-style: italic;
        }

        #input-area {
            padding: 16px 24px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            background: #0f0f1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        #user-input:focus {
            border-color: #7c83fd;
        }

        #send-btn {
            background: #7c83fd;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #6370f5;
        }

        #send-btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        #model-count {
            font-size: 0.75rem;
            color: #555;
            text-align: center;
            padding: 4px;
        }
    </style>
</head>

<body>
    <header>
        <h1>⚡ FusionAI</h1>
        <span>13 models · 8 providers</span>
        <button id="reset-btn" onclick="resetChat()">New Chat</button>
    </header>

    <div id="chat-box">
        <div class="message assistant">
            👋 Hello! I'm FusionAI — powered by 13 AI models working together. Ask me anything!
        </div>
    </div>

    <div id="model-count">Responses are fused from multiple AI models</div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask me anything..."
            onkeydown="if(event.key === 'Enter') sendMessage()" autofocus />
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const message = input.value.trim();
            if (!message) return;

            input.value = "";
            document.getElementById("send-btn").disabled = true;

            appendMessage("user", message);

            const thinking = appendMessage("thinking", "⏳ Querying all models and fusing responses...");

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();
                thinking.remove();
                appendMessage("assistant", data.response);
            } catch (err) {
                thinking.remove();
                appendMessage("assistant", "Something went wrong. Please try again.");
            }

            document.getElementById("send-btn").disabled = false;
            input.focus();
        }

        function appendMessage(role, text) {
            const box = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.textContent = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div;
        }

        async function resetChat() {
            await fetch("/reset", { method: "POST" });
            const box = document.getElementById("chat-box");
            box.innerHTML = `<div class="message assistant">👋 Hello! I'm FusionAI — powered by 13 AI models working together. Ask me anything!</div>`;
        }
    </script>
</body>

</html>
