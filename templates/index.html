<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusionAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}" defer></script>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <header>
        <div class="logo">
            <div class="logo-icon"><span>F</span></div>
            <div class="logo-text">
                <h1>FusionAI</h1>
                <span class="tagline">13 models · 8 providers</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>Live</span>
            </div>
            <button id="reset-btn" onclick="resetChat()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
                New Chat
            </button>
        </div>
    </header>

    <main>
        <div id="chat-box">
            <div class="welcome">
                <div class="welcome-icon">⚡</div>
                <h2>What can I help you with?</h2>
                <p>Powered by 13 AI models working in parallel to give you the best answer.</p>
                <div class="provider-chips">
                    <span>Groq</span><span>Gemini</span><span>Mistral</span>
                    <span>Cerebras</span><span>Cohere</span><span>Nvidia</span>
                    <span>SambaNova</span><span>OpenRouter</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div id="input-wrapper">
            <div id="image-preview" style="display:none;">
                <img id="preview-img" src="" alt="preview" />
                <span id="preview-name"></span>
                <button onclick="clearImage()">✕</button>
            </div>
            <div id="input-area">
                <button id="upload-btn" onclick="document.getElementById('file-input').click()"
                    title="Upload image or PDF">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                </button>
                <input type="file" id="file-input" accept="image/*,.pdf" style="display:none;"
                    onchange="handleFileUpload(event)" />
                <input type="text" id="user-input" placeholder="Ask anything or upload an image / PDF..." autofocus />
                <button id="send-btn" onclick="sendMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
            <p class="disclaimer">FusionAI synthesizes responses from multiple models. Results may vary.</p>
        </div>
    </footer>
</body>

</html>
