<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusionAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <header>
        <h1>⚡ FusionAI</h1>
        <span>13 models · 8 providers</span>
        <button id="reset-btn" onclick="resetChat()">New Chat</button>
    </header>

    <div id="chat-box">
        <div class="message assistant">
            👋 Hello! I'm FusionAI — powered by 13 AI models working together. Ask me anything!
        </div>
    </div>

    <div id="model-count">Responses are fused from multiple AI models</div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask me anything..." autofocus />
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const message = input.value.trim();
            if (!message) return;

            input.value = "";
            document.getElementById("send-btn").disabled = true;

            appendMessage("user", message);
            const thinking = appendMessage("thinking", "⏳ Querying all models and fusing responses...");

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                thinking.remove();
                appendMessage("assistant", data.response);
            } catch (err) {
                thinking.remove();
                appendMessage("assistant", "Something went wrong. Please try again.");
            }

            document.getElementById("send-btn").disabled = false;
            document.getElementById("user-input").focus();
        }

        function appendMessage(role, text) {
            const box = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.textContent = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div;
        }

        async function resetChat() {
            await fetch("/reset", { method: "POST" });
            const box = document.getElementById("chat-box");
            box.innerHTML = `<div class="message assistant">👋 Hello! I'm FusionAI — powered by 13 AI models working together. Ask me anything!</div>`;
        }

        document.getElementById("user-input").addEventListener("keydown", function (e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>

</html>
